<div translate translation="uploadWorldRecord" class="block-header h1-block-header"></div>

@if (user$ | async) {
  <div class="upload-content">
    <div class="file-upload-row">
      <input
        #fileInput
        (change)="onFileSelected()"
        type="file"
        accept=".dm_68"
        class="hidden-file-input"
        data-test-id="input-demo-upload"
      />
      <div class="file-name-display" (click)="fileInput.click()">
        {{ fileInput.files?.length ? fileInput.files![0].name : chooseDemoText }}
      </div>
      @if (playerType === wrPlayerTypes.DFCOMPS_USER) {
        <div>
          <input
            #playerInput
            class="player-search-input"
            [disabled]="playerType === wrPlayerTypes.DFCOMPS_USER"
            [formControl]="playerSearchControl"
            [matAutocomplete]="playerAutocomplete"
            [placeholder]="choosePlayerText"
            data-test-id="input-player-search"
          />
          <mat-autocomplete #playerAutocomplete="matAutocomplete" [displayWith]="displayPlayerFn">
            @for (player of filteredPlayers; track player.id) {
              <mat-option [value]="player" (onSelectionChange)="onPlayerSelected(player)">
                <app-player-cell
                  [nick]="player.nick"
                  [country]="player.country"
                  [playerId]="player.id"
                  [hoverEventsEnabled]="false"
                ></app-player-cell>
              </mat-option>
            }
          </mat-autocomplete>
        </div>
      }
      <button
        mat-raised-button
        color="primary"
        class="upload-button"
        (click)="upload()"
        [disabled]="isUploading"
        [class.uploading]="isUploading"
        data-test-id="button-demo-upload"
      >
        @if (isUploading) {
          <mat-spinner diameter="18" strokeWidth="2" color="accent" class="btn-spinner"></mat-spinner>
        }
        @if (!isUploading) {
          <mat-icon>upload</mat-icon>
        }
        <span translate translation="uploadWr"></span>
      </button>
    </div>

    <div class="player-type-section">
      <mat-radio-group [(ngModel)]="playerType" (ngModelChange)="onPlayerTypeChange()" class="player-type-group">
        <mat-radio-button
          [value]="wrPlayerTypes.MY_DEMO"
          color="primary"
          class="player-type-option"
          data-test-id="radio-my-demo"
        >
          <span translate translation="itsMyDemo"></span>
        </mat-radio-button>
        <mat-radio-button
          [value]="wrPlayerTypes.DF_NAME"
          color="primary"
          class="player-type-option"
          data-test-id="radio-df-name"
        >
          <span translate translation="useDfName"></span>
        </mat-radio-button>
        <mat-radio-button
          [value]="wrPlayerTypes.DFCOMPS_USER"
          color="primary"
          class="player-type-option"
          data-test-id="radio-dfcomps-user"
        >
          <span translate translation="selectFromUsers"></span>
        </mat-radio-button>
        @if (selectedPlayer) {
          <div class="player-selected-arrow">→</div>
          <app-player-cell
            [nick]="selectedPlayer.nick"
            [country]="selectedPlayer.country"
            [playerId]="selectedPlayer.id"
            [hoverEventsEnabled]="false"
          ></app-player-cell>
        }
      </mat-radio-group>
    </div>
    <div translate translation="uploadWrRules" class="upload-rules-text"></div>
  </div>
} @else {
  <div class="login-prompt">
    <span translate translation="loginOrRegister"></span>&nbsp;<span translate translation="toUploadWr"></span>
  </div>
}
