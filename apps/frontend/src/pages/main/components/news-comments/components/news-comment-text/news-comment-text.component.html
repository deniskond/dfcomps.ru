@for (messagePart of messageParts; track messagePart) {
  @if (messagePart.type === messagePartTypes.SMILE) {
    <div class="smile-container">
      <app-smile [smile]="$any(messagePart.content)"></app-smile>
    </div>
  } @else {
    <span [innerText]="messagePart.content" class="comment-text"></span>
  }
}
