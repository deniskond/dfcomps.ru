
@switch (timerState) {
  @case (timerStates.AWAITING_START) {
    <app-cup-timer-offline-awaiting
      [cupName]="cupName"
      [startTime]="startTime"
      (finished)="changeTimerState(timerStates.IN_PROGRESS)"
      >
    </app-cup-timer-offline-awaiting>
  }
  @case (timerStates.IN_PROGRESS) {
    <app-cup-timer-offline-progress
      [cupName]="cupName"
      [newsId]="newsId!"
      [mapLink]="mapLink"
      [endTime]="endTime"
      [customNews]="customNews"
      (finished)="changeTimerState(timerStates.FINISHED)"
      >
    </app-cup-timer-offline-progress>
  }
  @case (timerStates.FINISHED) {
    <app-cup-timer-offline-finished
      [cupName]="cupName"
      [newsId]="+newsId!"
      [mapLink]="mapLink"
      [customNews]="customNews"
      [endTime]="endTime"
      >
    </app-cup-timer-offline-finished>
  }
}
