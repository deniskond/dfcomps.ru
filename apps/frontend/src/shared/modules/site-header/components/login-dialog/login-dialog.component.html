<div translate translation="siteLogIn" class="h1-block-header dialog-header"></div>

@if (isSelectingMethod) {
  <div class="method-buttons">
    <div class="dialog-button">
      @if (isLoading) {
        <mat-spinner diameter="20" strokeWidth="2" color="accent" class="spinner"></mat-spinner>
      }
      <button (click)="proceedToLoginPassword()" mat-raised-button color="primary" data-test-id="password-login-button">
        <mat-icon>vpn_key</mat-icon>
        <span translate translation="logInWithPassword"></span>
      </button>
    </div>
    <div class="dialog-button">
      <button (click)="startDiscordOAuth()" mat-raised-button color="primary">
        <mat-icon>discord</mat-icon>
        <span translate translation="logInWithDiscord"></span>
      </button>
    </div>
  </div>
}

@if (!isSelectingMethod) {
  <form [formGroup]="loginForm">
    <div class="input-container">
      <div translate translation="userLogin" class="input-caption"></div>
      <input formControlName="login" class="input-field" data-test-id="login-input" />
    </div>
    <div class="input-container">
      <div translate translation="password" class="input-caption"></div>
      <input formControlName="password" class="input-field password" type="password" data-test-id="password-input" />
    </div>
  </form>
  @if (loginResult === false) {
    <div translate translation="wrongLoginPassword" class="login-error"></div>
  }
  <div class="dialog-button">
    @if (isLoading) {
      <mat-spinner diameter="20" strokeWidth="2" color="accent" class="spinner"></mat-spinner>
    }
    <button
      [disabled]="!loginForm.valid || isLoading"
      (click)="onLoginClick()"
      mat-raised-button
      color="primary"
      data-test-id="login-action-button"
      >
      <span translate translation="logIn"></span>
    </button>
  </div>
}
