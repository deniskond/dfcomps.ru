@if (isLoading) {
  <div class="loader">
    <mat-spinner diameter="30" strokeWidth="3" color="accent"></mat-spinner>
  </div>
} @else if (records.length === 0) {
  <div class="empty-state">No world records yet.</div>
} @else {
  <div class="last-wrs-header">
    <div class="cell header map">Map</div>
    <div class="cell header player">Player</div>
    <div class="cell header time">Time</div>
  </div>

  @for (record of records; track record.map + record.physics) {
    <div class="row">
      <div class="cell map left padding">
        {{ record.map }}
      </div>
      <div class="cell player left">
        @if (record.playerId) {
          <app-player-cell
            [nick]="record.playerNick!"
            [country]="record.playerCountry"
            [playerId]="record.playerId"
            [maxPlayerNameWidth]="72"
          ></app-player-cell>
        } @else {
          <div class="df-name">
            <app-flag [country]="null"></app-flag>
            <div class="df-name-caption">{{ record.playerNick }}</div>
          </div>
        }
      </div>
      <div class="cell time">
        <a href="#" class="wr-time">{{ formatTime(record.time) }}</a>
      </div>
    </div>
  }
}
