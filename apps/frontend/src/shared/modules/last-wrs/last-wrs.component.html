@if (isLoading) {
  <div class="loader">
    <mat-spinner diameter="30" strokeWidth="3" color="accent"></mat-spinner>
  </div>
} @else if (records.length === 0) {
  <div class="empty-state">No world records yet.</div>
} @else {
  <div class="wr-rows">
    @for (record of records; track record.map + record.physics) {
      <div class="wr-row">
        <div class="wr-map-line">
          <a routerLink="/wr-database" class="map-link">{{ record.map }}</a>
          <span class="physics-badge physics-badge--{{ record.physics }}">{{ record.physics | uppercase }}</span>
          <span class="wr-time">{{ formatTime(record.time) }}</span>
        </div>
        <div class="wr-player-line">
          @if (record.playerId) {
            <app-player-cell
              [nick]="record.playerNick!"
              [country]="record.playerCountry"
              [playerId]="record.playerId"
            ></app-player-cell>
          } @else {
            <span class="df-name">
              <app-flag [country]="null"></app-flag>
              {{ record.playerNick }}
            </span>
          }
        </div>
      </div>
    }
  </div>
}
