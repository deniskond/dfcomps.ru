@if (place && place > 3) {
  <span>{{ place }}</span>
}
@if (place === 1) {
  <img src="/assets/images/icons/result-tables/gold.png" class="cup" />
}
@if (place === 2) {
  <img src="/assets/images/icons/result-tables/silver.png" class="cup" />
}
@if (place === 3) {
  <img src="/assets/images/icons/result-tables/bronze.png" class="cup" />
}
