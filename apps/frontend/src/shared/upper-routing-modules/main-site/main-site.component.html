<a href="https://github.com/deniskond/dfcomps.ru" target="_blank">
  <div class="github"></div>
</a>

<div [class.mlp]="isMlp" class="background">
  <div class="container">
    <app-site-header></app-site-header>

    <div class="main">
      <div class="main-column">
        <router-outlet></router-outlet>
      </div>
      <div class="right-column sticky-main-column">
        <div class="right-block shadowed">
          <div class="side-block-header table-header">Recent World Records</div>
          <app-last-wrs></app-last-wrs>
        </div>
        <div class="right-block shadowed">
          @if (nextCupInfo$ | async; as cup) {
            <app-cup-timer
              [newsId]="cup.newsId"
              [startTime]="cup.startDateTime"
              [endTime]="cup.endDateTime"
              [cupType]="cup.type"
              [cupName]="cup | invokeFunction: getCupTimerName"
              [customNews]="cup.customNews"
              [mapLink]="cup.customMap || cup.mapPk3"
              [server]="server$ | async"
              [logo]="cup.logo"
            ></app-cup-timer>
          }
        </div>
        <div class="right-block shadowed">
          <div class="side-block-header table-header">
            <span translate translation="findOnevOne"></span>
          </div>
          <app-one-v-one-widget></app-one-v-one-widget>
        </div>
        <div class="right-block shadowed top-10-tables">
          <div class="side-block-header table-header">
            <span translate translation="ratingLeaders"></span>
          </div>
          <nav mat-tab-nav-bar [tabPanel]="tabPanel" class="navigation">
            <a [active]="activePage === 1" (click)="setTab(1)" mat-tab-link class="navigation-link">CPM</a>
            <a [active]="activePage === 2" (click)="setTab(2)" mat-tab-link class="navigation-link">VQ3</a>
            <a [active]="activePage === 3" (click)="setTab(3)" mat-tab-link class="navigation-link">CPM (1v1)</a>
            <a [active]="activePage === 4" (click)="setTab(4)" mat-tab-link class="navigation-link">VQ3 (1v1)</a>
          </nav>
          <mat-tab-nav-panel #tabPanel></mat-tab-nav-panel>
          @if (activePage === 1) {
            <app-top-ten-table
              [physics]="physics.CPM"
              [mode]="ratingtablesModes.CLASSIC"
            ></app-top-ten-table>
          }
          @if (activePage === 2) {
            <app-top-ten-table
              [physics]="physics.VQ3"
              [mode]="ratingtablesModes.CLASSIC"
            ></app-top-ten-table>
          }
          @if (activePage === 3) {
            <app-top-ten-table
              [physics]="physics.CPM"
              [mode]="ratingtablesModes.ONEVONE"
            ></app-top-ten-table>
          }
          @if (activePage === 4) {
            <app-top-ten-table
              [physics]="physics.VQ3"
              [mode]="ratingtablesModes.ONEVONE"
            ></app-top-ten-table>
          }
        </div>
      </div>
    </div>
  </div>
</div>
