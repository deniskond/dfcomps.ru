<a href="https://github.com/deniskond/dfcomps.ru" target="_blank">
  <div class="github"></div>
</a>

<div [class.mlp]="isMlp" class="background">
  <div class="container">
    <app-site-header></app-site-header>

    <div class="main">
      <div class="main-column">
        <router-outlet></router-outlet>
      </div>
      <div class="right-column sticky-main-column">
        <div class="right-block shadowed">
          @if (nextCupInfo$ | async; as cup) {
            <app-cup-timer
              [newsId]="cup.newsId"
              [startTime]="cup.startDateTime"
              [endTime]="cup.endDateTime"
              [cupType]="cup.type"
              [cupName]="cup | invokeFunction: getCupTimerName"
              [customNews]="cup.customNews"
              [mapLink]="cup.customMap || cup.mapPk3"
              [server]="server$ | async"
              [logo]="cup.logo"
            ></app-cup-timer>
          }
        </div>
        <div class="right-block shadowed">
          <div class="side-block-header table-header">Recent World Records</div>
          <nav mat-tab-nav-bar [tabPanel]="tabPanelWr" class="navigation">
            <a [active]="activeWrPage === 1" (click)="setWrTab(1)" mat-tab-link class="navigation-link wr">CPM</a>
            <a [active]="activeWrPage === 2" (click)="setWrTab(2)" mat-tab-link class="navigation-link wr">VQ3</a>
          </nav>
          <mat-tab-nav-panel #tabPanelWr></mat-tab-nav-panel>
          @if (activeWrPage === 1) {
            <app-last-wrs></app-last-wrs>
          }
          @if (activeWrPage === 2) {
            <app-last-wrs></app-last-wrs>
          }
        </div>
        <div class="right-block shadowed top-10-tables">
          <div class="side-block-header table-header">
            <span translate translation="ratingLeaders"></span>
          </div>
          <nav mat-tab-nav-bar [tabPanel]="tabPanelRating" class="navigation">
            <a [active]="activeRatingPage === 1" (click)="setRatingTab(1)" mat-tab-link class="navigation-link rating">
              CPM
            </a>
            <a [active]="activeRatingPage === 2" (click)="setRatingTab(2)" mat-tab-link class="navigation-link rating">
              VQ3
            </a>
            <a [active]="activeRatingPage === 3" (click)="setRatingTab(3)" mat-tab-link class="navigation-link rating">
              CPM (1v1)
            </a>
            <a [active]="activeRatingPage === 4" (click)="setRatingTab(4)" mat-tab-link class="navigation-link rating">
              VQ3 (1v1)
            </a>
          </nav>
          <mat-tab-nav-panel #tabPanelRating></mat-tab-nav-panel>
          @if (activeRatingPage === 1) {
            <app-top-ten-table [physics]="physics.CPM" [mode]="ratingtablesModes.CLASSIC"></app-top-ten-table>
          }
          @if (activeRatingPage === 2) {
            <app-top-ten-table [physics]="physics.VQ3" [mode]="ratingtablesModes.CLASSIC"></app-top-ten-table>
          }
          @if (activeRatingPage === 3) {
            <app-top-ten-table [physics]="physics.CPM" [mode]="ratingtablesModes.ONEVONE"></app-top-ten-table>
          }
          @if (activeRatingPage === 4) {
            <app-top-ten-table [physics]="physics.VQ3" [mode]="ratingtablesModes.ONEVONE"></app-top-ten-table>
          }
        </div>
      </div>
    </div>
  </div>
</div>
